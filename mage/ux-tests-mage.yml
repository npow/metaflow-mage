name: UX Tests - mage

# Compliance and integration tests for the mage orchestrator.
# Generated by: python -m metaflow_orchestrator_kit.scaffold mage
#
# Add this workflow to .github/workflows/ after wiring up the devstack.
# The compliance tests require metaflow-orchestrator-kit as a test dependency.

on:
  push:
    branches:
      - master
      - "**/mage/**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  ux-tests:
    name: "mage UX tests"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Runner (local) backend -- always included
          - backend: local
            services: "minio,postgresql,metadata-service"
            workers: 4

          # mage backend -- add the services your scheduler needs
          - backend: mage
            services: "minio,postgresql,metadata-service"  # TODO: add mage service
            workers: 4

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Metaflow and test dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" metaflow-orchestrator-kit pytest-xdist pytest-timeout pytest-cov

      - name: Set up minikube
        uses: medyagh/setup-minikube@latest
        with:
          driver: docker
          cpus: 2
          memory: 6144

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Tilt
        run: |
          curl -fsSL https://raw.githubusercontent.com/tilt-dev/tilt/master/scripts/install.sh \
            | VERSION=v0.33.11 bash

      - name: Start devstack
        working-directory: devtools
        run: |
          mkdir -p .devtools
          SERVICES="${ matrix.services }" \
            tilt up --stream 2>&1 | tee /tmp/tilt.log &
          for i in $(seq 1 60); do
            tilt get session >/dev/null 2>&1 && break
            sleep 2
          done
          tilt wait --for=condition=Ready "uiresource/(Tiltfile)" --timeout=120s
          tilt wait --for=condition=Ready uiresource/generate-configs --timeout=1800s

      - name: Start minikube tunnel
        run: sudo minikube tunnel &

      - name: Run compliance tests - ${ matrix.backend }
        run: |
          AWS_SHARED_CREDENTIALS_FILE="" \
          PYTHONPATH=$PWD \
          python -m pytest \
            metaflow_orchestrator_kit/compliance/ \
            test/ux/core/test_basic.py \
            test/ux/core/test_config.py \
            test/ux/core/test_dag.py \
            -m "not conda" \
            --ux-config=test/ux/ux_test_config.yaml \
            --only-backend "${ matrix.backend }" \
            -n ${ matrix.workers } \
            -v \
            --tb=short \
            --timeout=1800 \
            --cov=metaflow \
            --cov-report=xml:coverage.xml \
            --junit-xml=junit-${ matrix.backend }.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${ matrix.backend }
          path: coverage.xml
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${ matrix.backend }
          path: junit-${ matrix.backend }.xml
          if-no-files-found: ignore
