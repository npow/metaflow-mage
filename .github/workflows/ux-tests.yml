name: UX Tests

on:
  push:
    branches:
      - main
      - "**mage**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"  # nightly — catches upstream metaflow regressions
  workflow_dispatch:

env:
  METAFLOW_DEFAULT_METADATA: local
  METAFLOW_DEFAULT_DATASTORE: local
  METAFLOW_DEFAULT_ENVIRONMENT: local

jobs:
  # Fast unit tests that run without a Mage instance (compiler correctness, CLI helpers).
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: pip install -e ".[dev]" --quiet
      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # Runner tests execute flows locally — no Mage scheduler needed.
  runner-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          use-sudo: "false"
          conda: "false"
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          pytest-args: "-n 4 -v --tb=short --timeout=180 -k 'runner' --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: mage
                scheduler_type: mage
                cluster: null
                decospec: null
                deploy_args:
                  mage_host: http://localhost:6789
                  mage_project: metaflow_project
                enabled: true

  # Each deployer test gets its own worker with a fresh Mage container.
  # This eliminates serialization and lets all tests run in parallel.
  deployer-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        test:
          - test_hello_world
          - test_hello_project
          - test_from_deployment
          - test_retry
          - test_resources
          - test_catch
          - test_timeout
          - test_config_simple_default
          - test_config_simple_config_value
          - test_config_simple_config
          - test_mutable_flow_default
          - test_mutable_flow_config_value
          - test_config_corner_cases
          - test_branch
          - test_foreach
          - test_nested_foreach
          - test_nested_foreach_2x2
          - test_timeout_minutes_enforced
          - test_run_param_not_dropped
          - test_timeout_enforcement

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Pin Metaflow local datastore root
        # Must match the path mounted into the Mage container below so both
        # the test runner and Mage can read/write the same .metaflow artifacts.
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"

      - name: Start Mage via Docker
        run: |
          # Mount HOME so Mage can read/write .metaflow at the same path as the runner.
          # Mount the workspace so Mage can execute flow files by their absolute path.
          docker run -d --name mage \
            -p 6789:6789 \
            -v "$HOME:$HOME" \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -e REQUIRE_USER_AUTHENTICATION=0 \
            -e METAFLOW_DATASTORE_SYSROOT_LOCAL="$HOME" \
            mageai/mageai:latest \
            mage start metaflow_project

      - name: Wait for Mage to be healthy
        run: |
          timeout 120 bash -c '
            until curl -sf http://localhost:6789/api/status > /dev/null 2>&1; do
              echo "  waiting for Mage..."
              sleep 5
            done
          ' || { docker logs mage; exit 1; }
          echo "Mage is ready."

      - name: Install metaflow and metaflow-mage inside Mage container
        run: |
          CONTAINER=$(docker ps -q --filter name=mage)
          # Install metaflow (matching the branch under test).
          docker exec "$CONTAINER" pip install --quiet \
            "git+https://github.com/Netflix/metaflow.git@npow/corral-devstack"
          # Copy the extension source into the container at a non-mounted path so
          # root-owned build artifacts (egg-info) don't pollute the workspace and
          # cause permission errors when the runner later runs `pip install -e .`.
          docker cp "${{ github.workspace }}/." "$CONTAINER:/tmp/metaflow-mage-src/"
          docker exec "$CONTAINER" pip install --quiet /tmp/metaflow-mage-src

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          # Mage runs as root and creates root-owned .metaflow artifact files;
          # sudo -E lets pytest read them without permission errors.
          use-sudo: "true"
          conda: "false"
          coverage-artifact-suffix: "${{ matrix.test }}"
          pytest-args: "-v --tb=short --timeout=300 -k '${{ matrix.test }} and deployer' --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: mage
                scheduler_type: mage
                cluster: null
                decospec: null
                deploy_args:
                  mage_host: http://localhost:6789
                  mage_project: metaflow_project
                enabled: true

      - name: Dump Mage logs
        if: always()
        run: docker logs --tail=200 mage

      - name: Tear down
        if: always()
        run: docker rm -f mage || true

  test-report:
    if: always()
    needs: [unit-tests, runner-tests, deployer-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all JUnit XML artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: junit-artifacts/

      - name: Publish combined test report
        uses: dorny/test-reporter@v1
        with:
          name: "Test Results — All Backends"
          path: "junit-artifacts/**/*.xml"
          reporter: java-junit
          fail-on-error: false
